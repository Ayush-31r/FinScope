# render.yaml — drop this in your repo root
# Free-tier Render Web Service for FinScope FastAPI backend

services:
  - type: web
    name: finscope-api
    runtime: python
    plan: free                   # Render free tier
    region: oregon

    # Build: pull FAISS indexes from HF Hub, then install deps
    buildCommand: |
      pip install -r requirements.txt
      python hf_index_storage.py pull

    # Start the FastAPI server
    # Render injects $PORT; uvicorn must bind to 0.0.0.0:$PORT
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT

    envVars:
      # Set these in the Render dashboard → Environment tab
      # (do NOT commit real values here)
      - key: GROQ_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: HF_REPO_ID
        sync: false              # e.g. your-username/finscope-indexes

    # Render free tier spins down after 15 min of inactivity.
    # The health check keeps the service alive and lets Render
    # know when the startup (index pull + graph compile) is done.
    healthCheckPath: /health

    # Disk is ephemeral on free tier — indexes are always pulled fresh
    # from HuggingFace Hub on each deploy.
